<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="기찬날씨">
<meta name="theme-color" content="#1e3a5f">
<title>기찬시설관리(주) — 현장 시공·안전 통합 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f1f5f9;min-height:100vh}
select,button{font-family:inherit;cursor:pointer}
select{background:#fff;color:#111;border:1px solid #e2e8f0;border-radius:8px;padding:7px 10px;font-size:13px}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.07);padding:14px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:0}}
header{background:#1e3a5f;color:#fff;padding:0 16px;display:flex;align-items:center;gap:12px;height:56px;position:sticky;top:0;z-index:100}
.logo{background:#fff;color:#1e3a5f;font-weight:900;font-size:18px;padding:2px 10px;border-radius:6px;flex-shrink:0}
.hd{flex:1}.hd h1{font-size:14px;font-weight:700}.hd p{font-size:10px;opacity:.7}
.hclock{text-align:right;font-size:10px;opacity:.8;flex-shrink:0}
.hclock span{font-size:14px;font-weight:700;display:block}
main{padding:12px;max-width:680px;margin:0 auto}
.ctrl{margin-bottom:10px}
.dtabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.dbtn{padding:5px 10px;border-radius:20px;border:none;font-size:12px;font-weight:700;background:#e2e8f0;color:#64748b}
.dbtn.on{background:#1e3a5f;color:#fff}
.dbtn.mid{background:#e8f0fe;color:#3b5bdb}
.dbtn.mid.on{background:#3b5bdb;color:#fff}
.sels{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.locinfo{font-size:11px;color:#94a3b8;margin-top:7px}
.locinfo strong{color:#0369a1}
.loading{text-align:center;padding:32px 20px}
.spinner{width:36px;height:36px;border:3px solid #e2e8f0;border-top:3px solid #1e3a5f;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
.loading p{font-size:14px;font-weight:600;color:#334155;margin-bottom:6px}
.dots{display:flex;justify-content:center;gap:5px;margin-top:6px}
.dot{width:7px;height:7px;border-radius:50%;background:#e2e8f0;transition:background .4s}
.dot.on{background:#1e3a5f}
.errbox{background:#fee2e2;color:#b91c1c;padding:12px 16px;border-radius:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.errbox span{font-size:13px}
.rbtn{padding:6px 14px;background:#b91c1c;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700}
.banner{border-radius:14px;padding:22px 18px;text-align:center;margin-bottom:10px;color:#fff}
.bhint{font-size:11px;opacity:.7;margin-bottom:4px}
.blabel{font-size:42px;font-weight:900;line-height:1.1;margin-bottom:6px}
.bsub{font-size:16px;opacity:.95;line-height:1.5}
.midnotice{background:#e8f0fe;border:1px solid #3b5bdb;border-radius:10px;padding:10px 14px;margin-bottom:10px;font-size:13px;color:#1e3a8a}
.tmrwarn{border-radius:12px;padding:14px 16px;margin-bottom:10px;background:#7f1d1d;color:#fff;border-left:5px solid #ef4444}
.tmrwarn .tw1{font-size:13px;font-weight:900;margin-bottom:4px}
.tmrwarn .tw2{font-size:13px;opacity:.9}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
@media(max-width:480px){.grid2{grid-template-columns:1fr}}
.stitle{font-size:12px;color:#1e3a5f;font-weight:900;letter-spacing:.3px;margin-bottom:12px}
.tsep{margin-bottom:12px;padding-bottom:12px;border-bottom:1.5px solid #f1f5f9}
.tlabel{font-size:12px;color:#64748b;font-weight:700;margin-bottom:6px}
.tok{font-size:18px;font-weight:900;color:#15803d;line-height:1.3}
.tok-sub{font-size:13px;font-weight:600;color:#374151;margin-top:2px}
.twarn{font-size:15px;font-weight:700;color:#b91c1c;line-height:1.5;margin-bottom:4px}
.tstart{font-size:22px;font-weight:900;color:#15803d;line-height:1.2}
.tprot{font-size:22px;font-weight:900;color:#b91c1c;line-height:1.2}
.rtable{background:#fff1f2;border-radius:8px;padding:8px 10px;margin-top:8px}
.rtitle{font-size:10px;color:#94a3b8;font-weight:700;margin-bottom:5px}
.rrow{display:flex;justify-content:space-between;font-size:12px;padding:1px 0}
.rtotal{border-top:1px solid #fecdd3;margin-top:5px;padding-top:5px;font-size:12px;font-weight:700;color:#b91c1c;display:flex;justify-content:space-between}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #f8fafc}
.mlabel{font-size:13px;color:#64748b}
.msub{font-size:11px;color:#94a3b8;margin-left:4px}
.mval{font-size:16px;font-weight:800;color:#1e293b}
.mval.w{color:#b91c1c}
.safeok{background:#f0fdf4;border:1px solid #bbf7d0;text-align:center;margin-bottom:10px}
.safeok p{font-size:14px;font-weight:700;color:#15803d}
.safewarn{margin-bottom:10px}
.wi{border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;margin-bottom:6px}
.wh{background:#fef3c7;border:1px solid #fcd34d;color:#92400e}
.wd{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.wm{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.wr{background:#fff1f2;border:1px solid #fecdd3;color:#9f1239}
.footer{display:flex;justify-content:space-between;align-items:center;padding:4px 2px}
.sbadge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.badge-short{background:#dcfce7;color:#166534}
.badge-mid{background:#e8f0fe;color:#1e3a8a}
.refbtn{padding:7px 16px;background:#334155;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600}
#fover{display:none;position:fixed;inset:0;background:rgba(185,28,28,.45);animation:pulse .6s infinite;z-index:9998;pointer-events:none}
#fbanner{display:none;position:fixed;top:64px;left:50%;transform:translateX(-50%);background:#b91c1c;color:#fff;padding:12px 26px;border-radius:12px;font-size:15px;font-weight:700;z-index:9999;white-space:nowrap}
.empty{text-align:center;padding:48px 20px}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty h2{font-size:16px;font-weight:700;color:#334155;margin-bottom:6px}
.empty p{font-size:13px;color:#94a3b8}
</style>
</head>
<body>
<div id="fover"></div>
<div id="fbanner">⚠️ 강수 예보 급변! 즉시 확인 요망</div>

<header>
  <div class="logo">기찬</div>
  <div class="hd"><h1>기찬시설관리(주)</h1><p>현장 시공·안전 통합 관리 시스템</p></div>
  <div class="hclock"><span id="clock"></span><span id="lupd"></span></div>
</header>

<main>
  <div class="card ctrl">
    <div class="dtabs" id="dtabs"></div>
    <div class="sels">
      <select id="sreg"></select>
      <select id="sdist"></select>
      <select id="smat" style="margin-left:auto">
        <option value="none">선택 안 함</option>
        <option value="urethane">옥상 우레탄</option>
        <option value="epoxy">주차장 에폭시</option>
        <option value="inorganic">무기질 공사</option>
        <option value="polyurea">폴리우레아</option>
        <option value="silicon">외벽 실리콘</option>
        <option value="painting">외벽 도장</option>
      </select>
    </div>
    <div class="locinfo" id="locinfo"></div>
  </div>

  <div class="card loading" id="loading" style="display:none">
    <div class="spinner"></div>
    <p id="steptxt">기상청 데이터 조회 중…</p>
    <div class="dots"><div class="dot" id="d0"></div><div class="dot" id="d1"></div><div class="dot" id="d2"></div></div>
  </div>

  <div class="errbox" id="errbox" style="display:none">
    <span id="errmsg"></span>
    <button class="rbtn" onclick="doLoad()">재시도</button>
  </div>

  <div id="result" style="display:none">
    <div id="midnotice"></div>
    <div class="banner" id="banner">
      <div class="bhint">🟢≤30% · 🟡40% · 🔴≥50%</div>
      <div class="blabel" id="blabel"></div>
      <div class="bsub" id="bsub"></div>
    </div>
    <div id="tmrwarn"></div>

    <!-- 시공 시간 지침 -->
    <div class="grid2">
      <div class="card">
        <div class="stitle">💧 이슬 건조</div>
        <div id="dewinfo"></div>
      </div>
      <div class="card">
        <div class="stitle">🌧 강수 예보</div>
        <div id="raininfo"></div>
      </div>
    </div>

    <div class="card mcard">
      <div class="stitle">기상 정보</div>
      <div id="metrics"></div>
    </div>

    <div id="safety"></div>
    <div class="footer">
      <div style="font-size:12px;color:#94a3b8">참조 &nbsp;<span class="sbadge" id="srcbadge"></span></div>
      <button class="refbtn" onclick="doLoad()">🔄 새로고침</button>
    </div>
  </div>

  <div class="card empty" id="empty">
    <div class="empty-icon">🏗</div>
    <h2>지방·구/시를 선택해 주세요</h2>
    <p>드롭다운으로 지방 → 구/시 선택</p>
  </div>
</main>

// ── 헬퍼 ─────────────────────────────────────────────────────────────
function toGrid(lat,lon){
  const D=Math.PI/180,RE=6371.00877,GRID=5,
    s1=30*D,s2=60*D,olon=126*D,olat=38*D,XO=43,YO=136,re=RE/GRID;
  let sn=Math.log(Math.cos(s1)/Math.cos(s2))/Math.log(Math.tan(Math.PI*.25+s2*.5)/Math.tan(Math.PI*.25+s1*.5));
  let sf=Math.pow(Math.tan(Math.PI*.25+s1*.5),sn)*Math.cos(s1)/sn;
  let ro=re*sf/Math.pow(Math.tan(Math.PI*.25+olat*.5),sn);
  let ra=re*sf/Math.pow(Math.tan(Math.PI*.25+lat*D*.5),sn);
  let theta=lon*D-olon;
  if(theta>Math.PI)theta-=2*Math.PI;
  if(theta<-Math.PI)theta+=2*Math.PI;
  theta*=sn;
  return{nx:Math.floor(ra*Math.sin(theta)+XO+.5),ny:Math.floor(ro-ra*Math.cos(theta)+YO+.5)};
}

function getShortBase(){
  const now=new Date(),BT=[2,5,8,11,14,17,20,23];
  const cur=now.getHours()*60+now.getMinutes();
  let bh=23,bd=new Date(now),found=false;
  for(let i=BT.length-1;i>=0;i--){if(cur>=BT[i]*60+10){bh=BT[i];found=true;break;}}
  if(!found){bd.setDate(bd.getDate()-1);bh=23;}
  const y=bd.getFullYear(),m=String(bd.getMonth()+1).padStart(2,'0'),d=String(bd.getDate()).padStart(2,'0');
  return{base_date:`${y}${m}${d}`,base_time:String(bh).padStart(2,'0')+'00'};
}

function getUltraBase(){
  // 초단기예보: 매시 30분 발표, 45분 이후 사용 가능
  const now=new Date();
  let h=now.getHours(),m=now.getMinutes();
  let bd=new Date(now);
  if(m<45){h-=1;if(h<0){h=23;bd.setDate(bd.getDate()-1);}}
  const y=bd.getFullYear(),mn=String(bd.getMonth()+1).padStart(2,'0'),d=String(bd.getDate()).padStart(2,'0');
  return{base_date:`${y}${mn}${d}`,base_time:String(h).padStart(2,'0')+'30'};
}

function getMidTmFc(){
  const now=new Date();
  const h=now.getHours();
  const y=now.getFullYear(),m=String(now.getMonth()+1).padStart(2,'0'),d=String(now.getDate()).padStart(2,'0');
  if(h>=18) return `${y}${m}${d}1800`;
  if(h>=6)  return `${y}${m}${d}0600`;
  const yd=new Date(now); yd.setDate(yd.getDate()-1);
  const yy=yd.getFullYear(),ym=String(yd.getMonth()+1).padStart(2,'0'),ydd=String(yd.getDate()).padStart(2,'0');
  return `${yy}${ym}${ydd}1800`;
}

function getPrevMidTmFc(){
  const now=new Date();
  const h=now.getHours();
  const y=now.getFullYear(),m=String(now.getMonth()+1).padStart(2,'0'),d=String(now.getDate()).padStart(2,'0');
  if(h>=18) return `${y}${m}${d}0600`;
  const yd=new Date(now); yd.setDate(yd.getDate()-1);
  const yy=yd.getFullYear(),ym=String(yd.getMonth()+1).padStart(2,'0'),ydd=String(yd.getDate()).padStart(2,'0');
  if(h>=6) return `${yy}${ym}${ydd}1800`;
  return `${yy}${ym}${ydd}0600`;
}

function dateStr(off){
  const d=new Date();d.setDate(d.getDate()+off);
  return`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function calcDew(t,rh){
  const a=17.625,b=243.04,g=(a*t/(b+t))+Math.log(Math.max(rh,1)/100);
  return b*g/(a-g);
}
const hh=h=>`${String(Math.max(0,Math.min(23,h))).padStart(2,'0')}:00`;

// ── 단기예보 + 초단기예보 병합 ───────────────────────────────────────
async function fetchShort(la,lo,dayOff){
  const{nx,ny}=toGrid(la,lo);
  const sb=getShortBase(), ub=getUltraBase();

  // 두 API 병렬 호출
  const reqs=[fetch(`/api/weather?type=short&nx=${nx}&ny=${ny}&base_date=${sb.base_date}&base_time=${sb.base_time}`)];
  if(dayOff===0) reqs.push(fetch(`/api/weather?type=ultra_short&nx=${nx}&ny=${ny}&base_date=${ub.base_date}&base_time=${ub.base_time}`));
  const responses=await Promise.all(reqs);
  if(!responses[0].ok) throw new Error(`단기예보 오류 ${responses[0].status}`);
  const sData=await responses[0].json();
  if(sData.response?.header?.resultCode!=='00')throw new Error(`기상청: ${sData.response?.header?.resultMsg}`);

  // 단기예보 그룹화
  const grp={};
  for(const it of sData.response.body.items.item){
    const k=`${it.fcstDate}_${it.fcstTime}`;
    if(!grp[k])grp[k]={date:it.fcstDate,time:it.fcstTime};
    grp[k][it.category]=it.fcstValue;
  }

  // 초단기예보 데이터 (있으면 병합)
  const ultra={};
  if(dayOff===0 && responses[1] && responses[1].ok){
    try{
      const uData=await responses[1].json();
      if(uData.response?.header?.resultCode==='00'){
        for(const it of uData.response.body.items.item){
          const k=`${it.fcstDate}_${it.fcstTime}`;
          if(!ultra[k])ultra[k]={date:it.fcstDate,time:it.fcstTime};
          ultra[k][it.category]=it.fcstValue;
        }
      }
    }catch{}
  }

  const nowH=dayOff===0?new Date().getHours():0;
  const tgtDate=dateStr(dayOff);
  const tmrDate=dateStr(1);

  function parseDay(dstr,fromH){
    const slots=Object.values(grp).filter(d=>d.date===dstr).sort((a,b)=>a.time.localeCompare(b.time));
    let lastPop=0;
    return slots.map(d=>{
      const h=parseInt(d.time.substring(0,2));
      const k=`${d.date}_${d.time}`;
      const u=ultra[k]; // 초단기예보 데이터 (있으면)

      // 기온/습도: 초단기예보 우선
      const t=parseFloat(u?.T1H??d.TMP??20);
      const rh=parseInt(u?.REH??d.REH??70);

      // 강수확률: 단기예보 (초단기예보엔 없음)
      if(d.POP!==undefined)lastPop=parseInt(d.POP);

      // 초단기예보 데이터 존재 여부 (해당 시간에 초단기 데이터 있으면 더 정확)
      const isUltra = u && u.T1H !== undefined;
      // PTY: 초단기예보 우선, 없으면 단기예보 PTY 사용 (날씨누리 강수 아이콘과 동일 기준)
      const pty = isUltra ? parseInt(u.PTY??0) : parseInt(d.PTY??0);
      let rain=0;
      if(u?.RN1!==undefined && u.RN1!=='강수없음'){
        const v=parseFloat(u.RN1); if(!isNaN(v)) rain=v;
      } else if(d.PCP && d.PCP!=='강수없음' && d.PCP!=='0'){
        // "1mm 미만"은 0.5mm로 처리 (parseFloat 시 1로 잡혀 과대 표시되는 문제 방지)
        if(d.PCP.includes('미만')) rain=0.5;
        else { const v=parseFloat(d.PCP); if(!isNaN(v)) rain=v; }
      }
      // PTY>0 (실제 비 예보) 시 POP 보정 — 단기·초단기 공통 적용
      const effectiveP = pty>0 ? Math.max(lastPop,70) : lastPop;

      return{h,t,rh,p:effectiveP,rain,pty,dew:calcDew(t,rh)};
    }).filter(s=>s.h>=fromH);
  }

  const hourly=parseDay(tgtDate,nowH);
  const cur=hourly[0]||{t:20,rh:70,p:0,rain:0};

  // 내일 보양 경고
  let tmrMaxProb=0,tmrLabel='';
  if(dayOff===0){
    const tmrH=parseDay(tmrDate,0);
    tmrMaxProb=tmrH.length?Math.max(...tmrH.map(s=>s.p)):0;
    const td=new Date();td.setDate(td.getDate()+1);
    tmrLabel=td.toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'});
  }

  return{
    current:{temp:cur.t,humidity:cur.rh,precipProb:cur.p,dew:calcDew(cur.t,cur.rh)},
    hourly,nowH,tmrMaxProb,tmrLabel,isMid:false,
    hasUltra: dayOff===0 && Object.keys(ultra).length>0
  };
}

async function fetchMid(regId,dayOff){
  const tmFc=getMidTmFc();
  const landUrl=`/api/weather?type=mid_land&regId=${regId}&tmFc=${tmFc}`;
  const tempUrl=`/api/weather?type=mid_temp&regId=${regId}&tmFc=${tmFc}`;
  const[landRes,tempRes]=await Promise.all([fetch(landUrl),fetch(tempUrl)]);

  // HTTP 오류 즉시 표면화
  if(!landRes.ok)throw new Error(`중기육상예보 HTTP ${landRes.status} — /api/weather 함수 점검 필요`);
  if(!tempRes.ok)throw new Error(`중기기온예보 HTTP ${tempRes.status} — /api/weather 함수 점검 필요`);

  const[land,temp]=await Promise.all([landRes.json(),tempRes.json()]);

  // KMA 응답코드 확인 (00 = 정상)
  const lCode=land.response?.header?.resultCode;
  const tCode=temp.response?.header?.resultCode;
  const lMsg=land.response?.header?.resultMsg||'NO_RESPONSE';
  const tMsg=temp.response?.header?.resultMsg||'NO_RESPONSE';

  let li=land.response?.body?.items?.item?.[0];
  let ti=temp.response?.body?.items?.item?.[0];

  // 최신 발표 데이터가 아직 미생성 시 → 이전 발표시각으로 재시도
  if(!li||!ti){
    const prevTmFc=getPrevMidTmFc();
    const[land2,temp2]=await Promise.all([
      !li?fetch(`/api/weather?type=mid_land&regId=${regId}&tmFc=${prevTmFc}`).then(r=>r.json()):Promise.resolve(land),
      !ti?fetch(`/api/weather?type=mid_temp&regId=${regId}&tmFc=${prevTmFc}`).then(r=>r.json()):Promise.resolve(temp)
    ]);
    if(!li)li=land2.response?.body?.items?.item?.[0];
    if(!ti)ti=temp2.response?.body?.items?.item?.[0];
  }

  if(!li&&!ti)throw new Error(`중기예보 양쪽 모두 응답 없음 — Vercel /api/weather 함수에 mid_land/mid_temp 분기 미구현 의심 (육상:${lCode||'?'} 기온:${tCode||'?'})`);
  if(!li)throw new Error(`중기육상예보 데이터 없음 (응답코드:${lCode||'?'} / ${lMsg})`);
  if(!ti)throw new Error(`중기기온예보 데이터 없음 (응답코드:${tCode||'?'} / ${tMsg})`);

  const d=dayOff;
  const amPop=parseInt(li[`rnSt${d}Am`]??li[`rnSt${d}`]??0);
  const pmPop=parseInt(li[`rnSt${d}Pm`]??li[`rnSt${d}`]??0);
  const minT=parseFloat(ti[`taMin${d}`]??ti[`taMin${d}Low`]??10);
  const maxT=parseFloat(ti[`taMax${d}`]??ti[`taMax${d}High`]??20);
  const avgRh=70;

  // 현실적인 일중 기온 곡선 (새벽 최저 → 오후2시 최고 → 야간 하강)
  const hourly=[];
  for(let h=0;h<=23;h++){
    let t;
    if(h<=5) t=minT;
    else if(h<=14) t=minT+(maxT-minT)*((h-5)/9);
    else t=maxT-(maxT-minT)*((h-14)/9);
    const pop=h<12?amPop:pmPop;
    hourly.push({h,t,rh:avgRh,p:pop,rain:pop>=50?1:0,pty:pop>=50?1:0,dew:calcDew(t,avgRh)});
  }

  return{
    current:{temp:(minT+maxT)/2,humidity:avgRh,precipProb:Math.max(amPop,pmPop),dew:calcDew((minT+maxT)/2,avgRh)},
    hourly,nowH:0,tmrMaxProb:0,tmrLabel:'',isMid:true,
    amPop,pmPop,minT,maxT,
    wf:li[`wf${d}Am`]||li[`wf${d}`]||''
  };
}

// ── 판정 (관리자 협의 로직 추가) ───────────────────────────────────
function getJudge(amProb, pmProb, lateRainStart) {
  // 관리자 협의: 오전 ≤30% AND 15시 이후 비 예보
  if (amProb <= 30 && lateRainStart !== null && lateRainStart >= 15) {
    return {bg:'#d97706', label:'🤝 관리자와 협의', sub:'오전 작업 종료 가능 시 관리자와 협의 후 진행'};
  }
  const maxP = Math.max(amProb, pmProb);
  if (maxP <= 30) return {bg:'#15803d', label:'✅ 정상 작업',  sub:'전일 시공 가능'};
  if (maxP <= 40) return {bg:'#b45309', label:'⚠️ 오전만 작업', sub:'오후 기상 관찰'};
  return                {bg:'#b91c1c', label:'🚫 시공 취소',  sub:'보양 철저'};
}

function findDew(hourly,nowH,buf){
  // 새벽~오전 (4~9시) 중 이슬 조건 체크 (더 민감하게)
  // 이슬 조건: 기온이 이슬점 + 4°C 이내, 또는 습도 80% 이상
  const earlyH=hourly.filter(s=>s.h>=4&&s.h<=9);
  if(!earlyH.length) return null;
  const hasDew=earlyH.some(s=>s.t<=s.dew+4 || s.rh>=80);
  if(!hasDew)return null;

  // 건조 예상 시간 (기온이 이슬점 + 4°C 이상 AND 습도 < 75%)
  const startSearch = Math.max(nowH, 7);
  for(const s of hourly){
    if(s.h<startSearch)continue;
    if(s.t>s.dew+4 && s.rh<75) return{dryH:s.h, startH:Math.min(23, s.h+Math.ceil(buf/60))};
  }
  return null;
}

function findRain(hourly,nowH){
  // 실제 강수 예보 시간대 (PTY>0 또는 강수량>0) — 날씨누리 강수 아이콘과 동일 기준
  const sl=hourly.filter(s=>s.h>nowH && (s.pty>0 || s.rain>0));
  if(!sl.length)return null;
  const sH=sl[0].h, eH=sl[sl.length-1].h;
  const am=sl.map(s=>({h:s.h,mm:+s.rain.toFixed(1)}));
  return{sH, eH, protH:Math.max(0,sH-1), am, total:+(am.reduce((a,b)=>a+b.mm,0)).toFixed(1)};
}

function getAmPmProb(hourly){
  const am = hourly.filter(s=>s.h>=0 && s.h<=11);
  const pm = hourly.filter(s=>s.h>=12 && s.h<=23);
  return {
    amProb: am.length ? Math.max(...am.map(s=>s.p)) : 0,
    pmProb: pm.length ? Math.max(...pm.map(s=>s.p)) : 0
  };
}

// ── 렌더 ─────────────────────────────────────────────────────────────
function render(wx){
  const cfg=MAT[ST.mat],cur=wx.current;
  const {amProb, pmProb} = getAmPmProb(wx.hourly);
  const rainInfo=findRain(wx.hourly,wx.nowH);
  const lateRainStart = rainInfo && rainInfo.sH >= 15 ? rainInfo.sH : null;
  const jud=getJudge(amProb, pmProb, lateRainStart);

  const dewInfo=findDew(wx.hourly,wx.nowH,cfg.buf);
  const isDewOk = !dewInfo;
  const isHumOk=cur.humidity<cfg.hLim;
  const heat=cur.temp>=33;
  const noWarn=![heat,!isDewOk,!isHumOk,!!rainInfo].some(Boolean);

  // 중기예보 안내
  const mn=document.getElementById('midnotice');
  if(wx.isMid){
    mn.innerHTML=`<div class="midnotice">📅 중기예보 (4~9일) — 오전 강수확률 ${wx.amPop}% / 오후 ${wx.pmPop}% · 기온 ${wx.minT?.toFixed(0)}~${wx.maxT?.toFixed(0)}°C${wx.wf?` · ${wx.wf}`:''}<br><small style="opacity:.7">※ 중기예보는 단기예보보다 오차가 클 수 있습니다</small></div>`;
  } else { mn.innerHTML=''; }

  // 배너
  document.getElementById('banner').style.background=jud.bg;
  document.getElementById('blabel').textContent=jud.label;
  document.getElementById('bsub').innerHTML=jud.sub;

  // 내일 보양 경고
  const tw=document.getElementById('tmrwarn');
  if(ST.dayOff===0&&wx.tmrMaxProb>=50){
    tw.innerHTML=`<div class="tmrwarn"><div class="tw1">🚨 내일 ${wx.tmrLabel} 강수확률 ${wx.tmrMaxProb}% — 시공 취소 예보</div><div class="tw2">오늘 중 보양재 덮개 완료 및 자재·장비 정리 필요</div></div>`;
  } else { tw.innerHTML=''; }

  // 이슬
  const dEl=document.getElementById('dewinfo');
  if(isDewOk) {
    dEl.innerHTML=`<div class="tok">이슬 조건 없음</div><div class="tok-sub">— 시공 가능</div>`;
  } else if(dewInfo) {
    dEl.innerHTML=`<div class="twarn">이슬 ${hh(dewInfo.dryH)} 건조 예상</div><div class="tstart">${hh(dewInfo.startH)} 시공 시작</div>`;
  } else {
    dEl.innerHTML=`<div class="twarn">이슬 주의</div><div class="tok-sub" style="margin-top:4px">표면 직접 확인 후 시공</div>`;
  }

  // 강수
  const rEl=document.getElementById('raininfo');
  if(!rainInfo){
    rEl.innerHTML=`<div class="tok">강수 예보 없음</div><div class="tok-sub">— 보양 불요</div>`;
  } else {
    const rows=rainInfo.am.map(a=>`<div class="rrow" style="color:${a.mm>0?'#b91c1c':'#94a3b8'}"><span>${hh(a.h)}</span><span style="font-weight:${a.mm>0?700:400}">${a.mm>0?a.mm+'mm':'—'}</span></div>`).join('');
    const tot=rainInfo.total>0?`<div class="rtotal"><span>합계</span><span>${rainInfo.total}mm</span></div>`:'';
    rEl.innerHTML=`<div class="twarn">${hh(rainInfo.sH)} ~ ${hh(rainInfo.eH)} 강수</div>
      <div class="tprot">${hh(rainInfo.protH)}까지 보양 완료</div>
      <div class="rtable"><div class="rtitle">시간당 강수량</div>${rows}${tot}</div>`;
  }

  // 기상
  const midMetrics=wx.isMid?[
    {icon:'🌡',label:'최저기온', val:`${wx.minT?.toFixed(1)}°C`,warn:false},
    {icon:'🌡',label:'최고기온', val:`${wx.maxT?.toFixed(1)}°C`,warn:wx.maxT>=33},
    {icon:'🌧',label:'오전 강수확률',val:`${wx.amPop}%`,warn:wx.amPop>=50},
    {icon:'🌧',label:'오후 강수확률',val:`${wx.pmPop}%`,warn:wx.pmPop>=50},
  ]:[
    {icon:'🌡',label:'기온',   val:`${cur.temp?.toFixed(1)}°C`, warn:heat},
    {icon:'💦',label:'습도',   val:`${cur.humidity}%`,          warn:!isHumOk,sub:`기준 ${cfg.hLim}%`},
    {icon:'🌫',label:'이슬점', val:`${cur.dew?.toFixed(1)}°C`,  warn:!isDewOk},
    {icon:'🌧',label:'강수확률',val:`오전 ${amProb}% / 오후 ${pmProb}%`, warn:Math.max(amProb,pmProb)>=50}
  ];
  document.getElementById('metrics').innerHTML=midMetrics.map(m=>`<div class="mrow"><div class="mlabel">${m.icon} ${m.label}${m.sub?`<span class="msub">(${m.sub})</span>`:''}</div><div class="mval${m.warn?' w':''}">${m.val}</div></div>`).join('');

  // 안전
  const sEl=document.getElementById('safety');
  if(noWarn){
    sEl.innerHTML=`<div class="card safeok"><p>${SAFE_OK[new Date().getDate()%SAFE_OK.length]}</p></div>`;
  } else {
    let itms='';
    if(heat)itms+=`<div class="wi wh">🌡 폭염 ${cur.temp?.toFixed(1)}°C — 수분·염분(식염) 섭취 필수 · 1시간마다 10분 그늘 휴식</div>`;
    if(!isDewOk)itms+=`<div class="wi wd">💧 이슬 주의 — ${cfg.dn}</div>`;
    if(!isHumOk)itms+=`<div class="wi wm">💦 습도 초과 (${cur.humidity}%) — ${cfg.hn}</div>`;
    if(rainInfo)itms+=`<div class="wi wr">🌧 ${hh(rainInfo.sH)}~${hh(rainInfo.eH)} 강수 예보 — ${hh(rainInfo.protH)}까지 보양 완료 필수</div>`;
    sEl.innerHTML=`<div class="card safewarn"><div class="stitle">🦺 안전 주의사항</div>${itms}</div>`;
  }

  // 플래시
  if(ST.prevP!==null && cur.precipProb-ST.prevP>=20){
    document.getElementById('fover').style.display='block';
    document.getElementById('fbanner').style.display='block';
    clearTimeout(ST.flashT);
    ST.flashT=setTimeout(()=>{document.getElementById('fover').style.display='none';document.getElementById('fbanner').style.display='none';},12000);
  }
  ST.prevP=cur.precipProb;

  // 출처 배지
  const badge=document.getElementById('srcbadge');
  if(wx.isMid){
    badge.textContent='기상청 중기예보';
    badge.className='sbadge badge-mid';
  } else {
    badge.textContent=wx.hasUltra?'기상청 단기+초단기':'기상청 단기예보';
    badge.className='sbadge badge-short';
  }

  show('result');
  document.getElementById('lupd').textContent='갱신 '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}

// ── UI ───────────────────────────────────────────────────────────────
function show(id){['loading','errbox','result','empty'].forEach(x=>document.getElementById(x).style.display=x===id?'block':'none');}
function setStep(i){
  ['d0','d1','d2'].forEach((id,j)=>document.getElementById(id).className='dot'+(j<=i?' on':''));
  document.getElementById('steptxt').textContent=['기상청 서버 접속 중…','데이터 수신·병합 중…','시공 판단 계산 중…'][Math.min(i,2)];
}

const ST={region:'서울',distIdx:6,mat:'none',dayOff:0,prevP:null,flashT:null,_s:0};

async function doLoad(){
  const dl=LOC[ST.region],dist=dl[ST.distIdx]||dl[0];
  show('loading');setStep(0);
  const si=setInterval(()=>{ST._s=Math.min((ST._s||0)+1,2);setStep(ST._s);},2500);
  try{
    ST._s=0;
    let wx;
    if(ST.dayOff<=2){
      wx=await fetchShort(dist.la,dist.lo,ST.dayOff);
    } else {
      wx=await fetchMid(dist.midRegId,ST.dayOff);
    }
    render(wx);
  }catch(e){
    document.getElementById('errmsg').textContent=e.message;
    show('errbox');
  }finally{clearInterval(si);ST._s=0;}
}

function initDays(){
  const w=document.getElementById('dtabs');w.innerHTML='';
  const labels=['오늘','내일','모레'];
  for(let i=0;i<=9;i++){
    const d=new Date();d.setDate(d.getDate()+i);
    const lab=labels[i]||`${i+1}일후`;
    const md=d.toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'});
    const b=document.createElement('button');
    const isMid=i>=3;
    b.className=`dbtn${isMid?' mid':''}${i===ST.dayOff?' on':''}`;
    b.innerHTML=`${lab} <span style="font-weight:400;opacity:.8">${md}</span>`;
    b.onclick=()=>{ST.dayOff=i;document.querySelectorAll('.dbtn').forEach((x,j)=>{const m=j>=3;x.className=`dbtn${m?' mid':''}${j===i?' on':''}`;});show('empty');doLoad();};
    w.appendChild(b);
  }
}

function initReg(){
  const s=document.getElementById('sreg');
  s.innerHTML=Object.keys(LOC).map(r=>`<option>${r}</option>`).join('');
  s.value=ST.region;
  s.onchange=()=>{ST.region=s.value;ST.distIdx=0;initDist();show('empty');doLoad();};
}

function initDist(){
  const s=document.getElementById('sdist'),dl=LOC[ST.region];
  s.innerHTML=dl.map((d,i)=>`<option value="${i}">${d.n}</option>`).join('');
  s.value=ST.distIdx;
  s.onchange=()=>{ST.distIdx=Number(s.value);show('empty');updLoc();doLoad();};
  updLoc();
}

function updLoc(){
  const dist=(LOC[ST.region]||[])[ST.distIdx];if(!dist)return;
  const d=new Date();d.setDate(d.getDate()+ST.dayOff);
  document.getElementById('locinfo').innerHTML=`📍 ${ST.region} ${dist.n} · <strong>${d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'})}</strong>`;
}

document.getElementById('smat').onchange=e=>ST.mat=e.target.value;
setInterval(()=>document.getElementById('clock').textContent=new Date().toLocaleTimeString('ko-KR'),1000);
document.getElementById('clock').textContent=new Date().toLocaleTimeString('ko-KR');
setInterval(doLoad,10*60*1000);

initDays();initReg();initDist();show('empty');doLoad();
</script>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>기찬시설관리 - 현장 날씨 매니저</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #2563eb; --danger: #ef4444; --warning: #f59e0b; --success: #10b981; --text: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 16px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 16px; }
        .status-banner { border-radius: 12px; padding: 16px; text-align: center; font-weight: 700; color: white; margin-bottom: 16px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; background: #e2e8f0; padding: 4px; border-radius: 12px; }
        .tab { flex: 1; padding: 8px; border-radius: 8px; cursor: pointer; border: none; background: transparent; font-weight: 600; }
        .tab.active { background: white; color: var(--primary); }
        .loading { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header" style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <b style="color:var(--primary)">GICHAN WEATHER</b>
            <span id="region-txt" style="font-weight:600">경기도 광명시</span>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="changeTab(0)">오늘 시공</button>
            <button class="tab" onclick="changeTab(1)">내일 시공</button>
        </div>

        <div id="status-box" class="status-banner">데이터 로딩 중...</div>

        <div class="card">
            <div style="font-weight:700; margin-bottom:10px;">💧 바닥건조 & 결로 예측</div>
            <div id="ground-status" style="line-height:1.6;">지형 및 기상 분석 중입니다...</div>
        </div>

        <div class="card" id="weather-info">
            </div>
    </div>

    <div id="loading" class="loading"><div>분석 중...</div></div>

    <script>
        const ST = { region: "경기도", dayOff: 0 };
        const LOC = { "경기도": { name: "광명시", la: 37, lo: 126 } };

        function changeTab(d) {
            ST.dayOff = d;
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === d));
            doLoad();
        }

        async function doLoad() {
            document.getElementById('loading').style.display = 'flex';
            const loc = LOC[ST.region];
            const today = new Date().toISOString().slice(0,10).replace(/-/g,'');

            try {
                // 1. 서버에서 정밀 분석 데이터 가져오기
                const res = await fetch(`/api/weather?type=past_rain&region=${ST.region}&nx=${loc.la}&ny=${loc.lo}&day_off=${ST.dayOff}&base_date=${today}&base_time=0500`).then(r=>r.json());
                
                // 2. 단기 예보 가져오기 (결로 판단용)
                const wx = await fetch(`/api/weather?type=short&nx=${loc.la}&ny=${loc.lo}&base_date=${today}&base_time=0500`).then(r=>r.json());
                
                render(res, wx);
            } catch (e) { alert("오류 발생"); }
            finally { document.getElementById('loading').style.display = 'none'; }
        }

        function render(data, wxItems) {
            const statusBox = document.getElementById('status-box');
            const groundBox = document.getElementById('ground-status');
            
            // 결로 로직: 습도 85% 이상 (지형 가중치 적용 시 80%)
            const humidLimit = data.isHumidArea ? 80 : 85;
            const highHumi = wxItems.some(i => i.category === 'REH' && parseFloat(i.fcstValue) >= humidLimit);
            
            let status = 'ok', msg = '', detail = '';

            if (data.rain > 0 || data.hasNightRain) {
                status = 'no';
                msg = ST.dayOff === 0 ? "시공 불가 (어제 비 왔음)" : "시공 불가 (야간 강우 예보)";
                detail = `⚠️ 전일/야간 강수량 ${data.rain}mm가 확인됩니다. 바닥이 젖어 있을 확률이 매우 높습니다.`;
            } else if (highHumi) {
                status = 'warn';
                msg = "시공 주의 (결로/이슬 위험)";
                detail = `❗ ${data.isHumidArea ? '수변/산간 지형 특성상' : '습도가 높아'} 이슬점 발생 위험이 있습니다. 바닥이 눅눅할 수 있으니 확인 바랍니다.`;
            } else {
                status = 'ok';
                msg = "시공 가능성 높음";
                detail = "✅ 전일 비 없음 및 야간 결로 위험 낮음. 바닥 상태 양호 예상.";
            }

            statusBox.textContent = msg;
            statusBox.style.background = status === 'ok' ? '#10b981' : (status === 'no' ? '#ef4444' : '#f59e0b');
            groundBox.innerHTML = detail;
        }

        doLoad();
    </script>
</body>
</html>
